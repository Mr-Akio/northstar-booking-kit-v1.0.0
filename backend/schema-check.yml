components:
  schemas:
    AvailabilityRule:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        day_of_week:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        start_time:
          type: string
          format: time
        end_time:
          type: string
          format: time
        is_active:
          type: boolean
      required:
      - day_of_week
      - end_time
      - id
      - start_time
    BlackoutPeriod:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        start_datetime:
          type: string
          format: date-time
        end_datetime:
          type: string
          format: date-time
        reason:
          type: string
          maxLength: 255
      required:
      - end_datetime
      - id
      - reason
      - start_datetime
    Booking:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        booking_reference:
          type: string
          readOnly: true
        user:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
        resource:
          allOf:
          - $ref: '#/components/schemas/Resource'
          readOnly: true
        resource_id:
          type: string
          format: uuid
          writeOnly: true
        start_datetime:
          type: string
          format: date-time
        end_datetime:
          type: string
          format: date-time
        number_of_guests:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        status:
          allOf:
          - $ref: '#/components/schemas/BookingStatusEnum'
          readOnly: true
        unit_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
        total_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
        notes:
          type: string
        cancellation_reason:
          type: string
        cancelled_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        guests:
          type: array
          items:
            $ref: '#/components/schemas/BookingGuest'
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - booking_reference
      - cancelled_at
      - created_at
      - end_datetime
      - id
      - resource
      - resource_id
      - start_datetime
      - status
      - total_price
      - unit_price
      - updated_at
      - user
    BookingAction:
      type: object
      properties:
        reason:
          type: string
    BookingGuest:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        full_name:
          type: string
          maxLength: 255
        email:
          oneOf:
          - type: string
            format: email
            maxLength: 254
          - type: string
            maxLength: 0
        phone:
          type: string
          maxLength: 50
        notes:
          type: string
      required:
      - full_name
      - id
    BookingStatusEnum:
      enum:
      - pending
      - confirmed
      - cancelled
      - completed
      - rejected
      type: string
      description: |-
        * `pending` - Pending
        * `confirmed` - Confirmed
        * `cancelled` - Cancelled
        * `completed` - Completed
        * `rejected` - Rejected
    CategoryEnum:
      enum:
      - room
      - meeting
      - clinic
      - salon
      - vehicle
      - table
      - venue
      - other
      type: string
      description: |-
        * `room` - Room
        * `meeting` - Meeting Space
        * `clinic` - Clinic
        * `salon` - Salon
        * `vehicle` - Vehicle
        * `table` - Table
        * `venue` - Venue
        * `other` - Other
    ChangePassword:
      type: object
      properties:
        current_password:
          type: string
          writeOnly: true
        new_password:
          type: string
          writeOnly: true
          minLength: 8
        confirm_password:
          type: string
          writeOnly: true
      required:
      - confirm_password
      - current_password
      - new_password
    DurationModeEnum:
      enum:
      - flexible
      - fixed_slot
      type: string
      description: |-
        * `flexible` - Flexible
        * `fixed_slot` - Fixed Slot
    ForgotPassword:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
      - email
    Login:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          writeOnly: true
      required:
      - email
      - password
    Logout:
      type: object
      properties:
        refresh:
          type: string
    PaginatedBookingList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/Booking'
    PaginatedResourceList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
